<h1> Ваши задачи </h1>

<form action="{% url 'add' %}" method="POST">
    {% csrf_token %}
    <input name="title" placeholder="Новая задача">
    <button> Добавить </button>
</form>

{% for task in tasks %}
    <p> {{task.title}} </p>
    <a href="delete/{{ task.id }}"> delete/{{ task.id }}  Удалить </a>
{% endfor %}
